<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Stumphouse Farms – Check In</title>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green-dark:  #244426;
      --green-mid:   #61794E;
      --green-light: #819471;
      --cream:       #ffffff;
      --green-bg:    #e8f0e4;
      --cream-dark:  #ae8c67;
      --text-main:   #1a2e1a;
      --text-muted:  #5a6b52;
      --text-faint:  #8a9b82;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--green-dark);
      overflow: hidden;
    }

    #app {
      height: 100vh;
      width: 100vw;
      background: var(--cream);
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--green-dark);
      padding: clamp(24px,4vh,48px) clamp(24px,4vw,64px) clamp(20px,3vh,36px);
      text-align: center;
      flex-shrink: 0;
    }

    .company-name {
      font-size: clamp(22px,3.5vw,38px);
      font-weight: bold;
      color: var(--cream);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .company-tagline {
      font-size: clamp(10px,1.4vw,14px);
      color: var(--green-light);
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(24px,4vh,56px) clamp(24px,6vw,80px);
      overflow: hidden;
    }

    /* NEW LOGO STYLE */
   .welcome-logo {
  width: clamp(220px, 32vw, 420px);
  height: auto;
  display: block;
  margin: 0 auto 10px;
  object-fit: contain;
}

	.welcome {
	text-align: center;
  	margin-bottom: clamp(28px,4vh,52px);
    }

    .welcome h2 {
      font-size: clamp(22px,3vw,34px);
      color: var(--green-dark);
      margin-bottom: 10px;
    }

    .welcome p {
      font-size: clamp(14px,1.8vw,18px);
      color: var(--text-muted);
      line-height: 1.6;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      width: 100%;https://i.imgur.com/gA0OtfH.png
      max-width: 900px;
    }

    .pickup-btn {
      background: white;
      border: 2.5px solid var(--green-dark);
      border-radius: 20px;
      padding: clamp(20px,3vh,32px) clamp(20px,2.5vw,32px);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 20px;
      text-align: left;
      transition: background 0.18s ease, transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .pickup-btn:hover,
    .pickup-btn:active {
      background: var(--green-dark);
      transform: translateY(-3px);
    }

    .pickup-btn:hover .btn-icon,
    .pickup-btn:active .btn-icon {
      color: var(--cream);
    }

    .pickup-btn:hover .btn-title,
    .pickup-btn:active .btn-title {
      color: var(--cream);
    }

    .pickup-btn:hover .btn-sub,
    .pickup-btn:active .btn-sub {
      color: var(--green-light);
    }

    .btn-icon {
      font-size: clamp(28px,4vw,42px);
      color: var(--green-dark);
      width: 52px;
      text-align: center;
      flex-shrink: 0;
      transition: color 0.18s;
    }

    .btn-title {
      font-size: clamp(16px,2vw,22px);
      font-weight: bold;
      color: var(--green-dark);
      margin-bottom: 4px;
      transition: color 0.18s;
    }

    .btn-sub {
      font-size: clamp(11px,1.3vw,14px);
      color: var(--text-faint);
      transition: color 0.18s;
    }

    .footer {
      background: var(--green-dark);
      padding: 14px;
      text-align: center;
      font-size: 11px;
      color: var(--green-light);
      letter-spacing: 3px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

<div id="app">

  <header class="header">
    <div class="company-name">Stumphouse Farms</div>
    <div class="company-tagline">More than a hatchery</div>
  </header>

  <main class="main">

    <!-- NEW LOGO -->
    <img src="https://i.imgur.com/gA0OtfH.png" alt="Stumphouse Farms Logo" class="welcome-logo" />

    <div class="welcome">
      <h2>Welcome!</h2>
      <p>
        Tap below to check-in<br>
        and we'll be right with you.
      </p>
    </div>

    <div class="options-grid" id="optionsGrid"></div>

  </main>

  <footer class="footer">
    Stumphouse Farms · Anderson, SC
  </footer>

</div>

<script>

  const PICKUP_OPTIONS = [
    {
      label: 'Chick Pickup',
      sub: "I'm here to pick up chicks I ordered",
      icon: '🐣'
    }
  ];

  function buildOptions() {

    const grid = document.getElementById('optionsGrid');

    PICKUP_OPTIONS.forEach(opt => {

      const btn = document.createElement('button');

      btn.className = 'pickup-btn';

      btn.innerHTML = `
        <div class="btn-icon">${opt.icon}</div>
        <div>
          <div class="btn-title">${opt.label}</div>
          <div class="btn-sub">${opt.sub}</div>
        </div>
      `;

      grid.appendChild(btn);
    });
  }

  buildOptions();

</script>

</body>
</html>
